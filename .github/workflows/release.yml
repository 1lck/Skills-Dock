name: 'Publish release'

# 当推送到以 'v' 开头的 tag 时触发 (例如 v0.1.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS 打包 (生成 .dmg 和 .app)
          - platform: 'macos-latest'
            args: ''
          # Windows 打包 (生成 .msi 和 .exe)
          - platform: 'windows-latest'
            args: ''
          # Linux 打包 (生成 .AppImage 和 .deb)
          - platform: 'ubuntu-22.04'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Install app dependencies
        run: npm install

      - name: Prepare updater signing key (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          printf '%s' "${{ secrets.TAURI_PRIVATE_KEY }}" > "$RUNNER_TEMP/tauri.key"
          echo "TAURI_SIGNING_PRIVATE_KEY=$RUNNER_TEMP/tauri.key" >> "$GITHUB_ENV"

      - name: Prepare updater signing key (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAURI_PRIVATE_KEY_RAW: ${{ secrets.TAURI_PRIVATE_KEY }}
        run: |
          $keyPath = Join-Path $env:RUNNER_TEMP "tauri.key"
          [System.IO.File]::WriteAllText($keyPath, $env:TAURI_PRIVATE_KEY_RAW)
          "TAURI_SIGNING_PRIVATE_KEY=$keyPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # Tauri 官方打包 action
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Skills Dock ${{ github.ref_name }}'
          releaseBody: '🤖 自动发布的 Skills Dock 安装包。请在下方 Assets 中下载对应平台的安装文件。'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
