name: 'Publish release'

# 当推送到以 'v' 开头的 tag 时触发 (例如 v0.1.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS 打包 (生成 .dmg 和 .app)
          - platform: 'macos-latest'
            args: ''
          # Windows 打包 (生成 .msi 和 .exe)
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install app dependencies
        run: npm install

      # Tauri 官方打包 action
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Skills Dock ${{ github.ref_name }}'
          releaseBody: '🤖 自动发布的 Skills Dock 安装包。请在下方 Assets 中下载对应平台的安装文件。'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
